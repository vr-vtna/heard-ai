[pytest]
# Pytest configuration for heard-ai

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts = 
    --verbose
    --strict-markers
    -ra
    --tb=short
    --disable-warnings

markers =
    integration: integration tests
    unit: unit tests
    slow: slow running tests
